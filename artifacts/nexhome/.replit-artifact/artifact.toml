kind = "web"
previewPath = "/"
title = "NexHome"
version = "1.0.0"
id = "artifacts/nexhome"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22722

[services.development]
run = "pnpm --filter @workspace/nexhome run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/nexhome", "run", "build" ]
publicDir = "artifacts/nexhome/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22722"
BASE_PATH = "/"
