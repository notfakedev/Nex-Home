<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OrbytStore Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@600;700&family=Exo+2:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --void:#020408;--surface:#0A1120;--panel:#101D35;--panel2:#152240;
  --rim:#1C2E4A;--rim2:#243B60;--accent:#0CF;--blue:#0E6FE8;--blue2:#2589FF;
  --ember:#FF4D2E;--gold:#FFB800;--green:#22c55e;--mist:#6B8BAF;
  --fog:#99B5D5;--snow:#D6E8FF;--white:#fff;
}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:16px;background:var(--void);}
body{background:var(--void);color:var(--snow);font-family:'Exo 2',sans-serif;min-height:100vh;}

/* LOGIN */
#loginScreen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:var(--void);}
.login-box{background:var(--panel2);border:1px solid var(--rim2);border-radius:20px;padding:40px;width:min(380px,92vw);text-align:center;}
.login-box h1{font-family:'Rajdhani',sans-serif;font-size:1.8rem;font-weight:700;margin-bottom:6px;}
.login-box p{color:var(--mist);font-size:.85rem;margin-bottom:28px;}
.inp{width:100%;background:var(--surface);border:1px solid var(--rim2);border-radius:10px;padding:12px 16px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.9rem;outline:none;margin-bottom:14px;transition:border-color .2s;}
.inp:focus{border-color:var(--blue2);}
.btn{width:100%;background:linear-gradient(135deg,var(--blue),var(--blue2));color:#fff;border:none;padding:13px;border-radius:10px;font-family:'Exo 2',sans-serif;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s;}
.btn:hover{opacity:.88;}

/* MAIN */
#mainScreen{display:none;}
header{background:rgba(2,4,8,.95);backdrop-filter:blur(24px);border-bottom:1px solid var(--rim);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;}
.logo{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;color:var(--white);display:flex;align-items:center;gap:8px;}
.logo span{color:var(--accent);}
.header-right{display:flex;align-items:center;gap:16px;}
.btn-sm{background:var(--rim);border:none;color:var(--snow);padding:7px 16px;border-radius:8px;font-family:'Exo 2',sans-serif;font-size:.78rem;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-sm:hover{background:var(--rim2);}

main{padding:28px 32px;max-width:1400px;margin:0 auto;}

/* TABS */
.tabs{display:flex;gap:6px;margin-bottom:24px;border-bottom:1px solid var(--rim);padding-bottom:0;}
.tab-btn{background:none;border:none;color:var(--mist);font-family:'Exo 2',sans-serif;font-size:.9rem;font-weight:600;padding:10px 20px;cursor:pointer;border-bottom:2px solid transparent;margin-bottom:-1px;transition:color .2s,border-color .2s;}
.tab-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
.tab-btn:hover{color:var(--snow);}
.tab-panel{display:none;}
.tab-panel.active{display:block;}

/* STATS */
.stats{display:grid;grid-template-columns:repeat(auto-fill,minmax(180px,1fr));gap:14px;margin-bottom:28px;}
.stat-card{background:var(--panel);border:1px solid var(--rim);border-radius:14px;padding:18px 20px;}
.stat-card .val{font-family:'Rajdhani',sans-serif;font-size:1.9rem;font-weight:700;color:var(--white);line-height:1;}
.stat-card .lbl{font-size:.68rem;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);margin-top:4px;}

/* FILTER BAR */
.filter-bar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.filter-bar select,.filter-bar input{background:var(--panel);border:1px solid var(--rim2);border-radius:9px;padding:8px 14px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.82rem;outline:none;}
.filter-bar input{flex:1;min-width:180px;}
.btn-refresh{background:var(--blue);border:none;color:#fff;padding:8px 18px;border-radius:9px;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:600;cursor:pointer;}

/* TABLE */
.table-wrap{overflow-x:auto;border-radius:16px;border:1px solid var(--rim);}
table{width:100%;border-collapse:collapse;font-size:.82rem;}
thead{background:var(--panel2);}
th{padding:12px 16px;text-align:left;font-size:.67rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:var(--mist);white-space:nowrap;}
td{padding:13px 16px;border-top:1px solid var(--rim);vertical-align:top;}
tr:hover td{background:rgba(14,111,232,.04);}
.order-id{font-family:'Rajdhani',sans-serif;font-weight:700;color:var(--accent);font-size:.95rem;}
.customer-name{font-weight:600;color:var(--white);}
.customer-detail{color:var(--mist);font-size:.75rem;margin-top:2px;}
.address-block{color:var(--fog);font-size:.76rem;line-height:1.5;}
.items-list{color:var(--fog);font-size:.76rem;line-height:1.6;}
.amount{font-family:'Rajdhani',sans-serif;font-size:1rem;font-weight:700;color:var(--white);}
.date{color:var(--mist);font-size:.75rem;white-space:nowrap;}

/* STATUS BADGE */
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:999px;font-size:.65rem;font-weight:700;letter-spacing:.08em;text-transform:uppercase;white-space:nowrap;}
.badge-pending{background:rgba(255,184,0,.12);color:var(--gold);border:1px solid rgba(255,184,0,.25);}
.badge-paid{background:rgba(34,197,94,.12);color:var(--green);border:1px solid rgba(34,197,94,.25);}
.badge-processing{background:rgba(14,111,232,.15);color:var(--blue2);border:1px solid rgba(14,111,232,.3);}
.badge-shipped{background:rgba(0,204,255,.12);color:var(--accent);border:1px solid rgba(0,204,255,.25);}
.badge-delivered{background:rgba(34,197,94,.2);color:#4ade80;border:1px solid rgba(34,197,94,.4);}
.badge-cancelled{background:rgba(255,77,46,.12);color:var(--ember);border:1px solid rgba(255,77,46,.25);}

/* ACTIONS */
.actions{display:flex;flex-direction:column;gap:6px;min-width:130px;}
.sel-status{width:100%;background:var(--surface);border:1px solid var(--rim2);border-radius:7px;padding:6px 9px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.76rem;outline:none;cursor:pointer;}
.btn-save{width:100%;background:var(--blue);border:none;color:#fff;padding:6px;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:.74rem;font-weight:600;cursor:pointer;}
.btn-save:hover{background:var(--blue2);}
.notes-inp{width:100%;background:var(--surface);border:1px solid var(--rim2);border-radius:7px;padding:6px 9px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.74rem;resize:vertical;min-height:50px;outline:none;}
.supplier-inp{width:100%;background:var(--surface);border:1px solid rgba(0,204,255,.2);border-radius:7px;padding:6px 9px;color:var(--accent);font-family:'Exo 2',sans-serif;font-size:.73rem;resize:vertical;min-height:40px;outline:none;font-style:italic;}

/* PRODUCTS SECTION */
.prod-toolbar{display:flex;align-items:center;gap:12px;margin-bottom:18px;flex-wrap:wrap;}
.prod-toolbar input{background:var(--panel);border:1px solid var(--rim2);border-radius:9px;padding:8px 14px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.82rem;outline:none;flex:1;min-width:180px;}
.btn-new{background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;color:#fff;padding:8px 20px;border-radius:9px;font-family:'Exo 2',sans-serif;font-size:.82rem;font-weight:700;cursor:pointer;}
.prod-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:14px;}
.prod-card{background:var(--panel);border:1px solid var(--rim);border-radius:14px;padding:18px;transition:border-color .2s;}
.prod-card.inactive{opacity:.55;border-style:dashed;}
.prod-card-head{display:flex;align-items:flex-start;justify-content:space-between;gap:12px;margin-bottom:12px;}
.prod-card-name{font-weight:700;color:var(--white);font-size:.92rem;line-height:1.3;}
.prod-card-slug{color:var(--mist);font-size:.7rem;margin-top:2px;font-family:monospace;}
.prod-card-price{font-family:'Rajdhani',sans-serif;font-size:1.15rem;font-weight:700;color:var(--accent);}
.prod-card-actions{display:flex;gap:8px;margin-top:12px;}
.btn-edit{background:var(--rim2);border:none;color:var(--snow);padding:6px 14px;border-radius:7px;font-family:'Exo 2',sans-serif;font-size:.76rem;font-weight:600;cursor:pointer;transition:background .2s;}
.btn-edit:hover{background:var(--blue);}
.toggle-wrap{display:flex;align-items:center;gap:7px;font-size:.76rem;color:var(--mist);}
.toggle{position:relative;width:36px;height:20px;cursor:pointer;}
.toggle input{opacity:0;width:0;height:0;}
.slider{position:absolute;inset:0;background:var(--rim2);border-radius:999px;transition:.2s;}
.slider:before{content:'';position:absolute;width:14px;height:14px;left:3px;top:3px;background:var(--fog);border-radius:50%;transition:.2s;}
.toggle input:checked+.slider{background:var(--green);}
.toggle input:checked+.slider:before{transform:translateX(16px);background:#fff;}

/* MODAL */
.modal-backdrop{position:fixed;inset:0;background:rgba(2,4,8,.85);z-index:200;display:flex;align-items:center;justify-content:center;padding:20px;}
.modal-box{background:var(--panel2);border:1px solid var(--rim2);border-radius:20px;padding:32px;width:min(540px,100%);max-height:90vh;overflow-y:auto;}
.modal-box h3{font-family:'Rajdhani',sans-serif;font-size:1.4rem;font-weight:700;margin-bottom:20px;}
.form-row{margin-bottom:14px;}
.form-row label{display:block;font-size:.74rem;font-weight:600;color:var(--mist);text-transform:uppercase;letter-spacing:.08em;margin-bottom:5px;}
.form-row input,.form-row textarea,.form-row select{width:100%;background:var(--surface);border:1px solid var(--rim2);border-radius:9px;padding:10px 14px;color:var(--snow);font-family:'Exo 2',sans-serif;font-size:.88rem;outline:none;transition:border-color .2s;}
.form-row input:focus,.form-row textarea:focus,.form-row select:focus{border-color:var(--blue2);}
.form-row textarea{resize:vertical;min-height:70px;}
.form-row-2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.modal-actions{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;}
.btn-cancel{background:var(--rim);border:none;color:var(--snow);padding:10px 22px;border-radius:9px;font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:600;cursor:pointer;}
.btn-submit{background:linear-gradient(135deg,var(--blue),var(--blue2));border:none;color:#fff;padding:10px 24px;border-radius:9px;font-family:'Exo 2',sans-serif;font-size:.88rem;font-weight:700;cursor:pointer;}

/* EMPTY */
.empty{text-align:center;padding:60px;color:var(--mist);}
.empty-icon{font-size:2.5rem;margin-bottom:12px;}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;z-index:999;display:flex;flex-direction:column;gap:8px;}
.t{background:var(--panel2);border:1px solid var(--rim2);border-radius:10px;padding:12px 18px;font-size:.82rem;animation:slideIn .25s ease;max-width:300px;}
.t.ok{border-color:rgba(34,197,94,.4);color:#4ade80;}
.t.err{border-color:rgba(255,77,46,.4);color:var(--ember);}
@keyframes slideIn{from{transform:translateX(40px);opacity:0}to{transform:translateX(0);opacity:1}}

@media(max-width:700px){
  main{padding:16px;}
  header{padding:14px 16px;}
  th,td{padding:10px 10px;}
  .form-row-2{grid-template-columns:1fr;}
}
</style>
</head>
<body>

<div id="loginScreen">
  <div class="login-box">
    <div style="margin-bottom:14px;display:flex;justify-content:center;">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="44" height="44"><circle cx="12" cy="12" r="4.5" fill="#0CF"/><ellipse cx="12" cy="12" rx="10.5" ry="4.4" stroke="#0CF" stroke-width="1.6" fill="none" opacity="0.75" transform="rotate(-35 12 12)"/><circle cx="6.8" cy="8.5" r="1.9" fill="rgba(0,204,255,0.9)"/></svg>
    </div>
    <h1>Orbyt<span style="color:var(--accent)">Store</span> Admin</h1>
    <p>Painel de gerenciamento</p>
    <input class="inp" id="tokenInput" type="password" placeholder="Token de acesso" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="btn" onclick="doLogin()">Entrar</button>
    <p id="loginErr" style="color:var(--ember);font-size:.8rem;margin-top:12px;display:none;">Token inválido</p>
  </div>
</div>

<div id="mainScreen">
  <header>
    <div class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg" width="22" height="22"><circle cx="12" cy="12" r="4" fill="white"/><ellipse cx="12" cy="12" rx="10" ry="4.2" stroke="white" stroke-width="1.5" fill="none" opacity="0.8" transform="rotate(-35 12 12)"/><circle cx="6.8" cy="8.5" r="1.7" fill="#0CF"/></svg>
      Orbyt<span>Store</span> <span style="color:var(--mist);font-weight:400;font-size:.85rem;margin-left:8px;">Admin</span>
    </div>
    <div class="header-right">
      <span id="headerDate" style="color:var(--mist);font-size:.78rem;"></span>
      <button class="btn-sm" onclick="logout()">Sair</button>
    </div>
  </header>

  <main>
    <div class="tabs">
      <button class="tab-btn active" onclick="switchTab('orders',this)">📦 Pedidos</button>
      <button class="tab-btn" onclick="switchTab('products',this)">🛍️ Produtos</button>
    </div>

    <!-- ORDERS TAB -->
    <div class="tab-panel active" id="tab-orders">
      <div class="stats" id="statsRow"></div>
      <div class="filter-bar">
        <input id="searchInput" placeholder="Buscar por nome, e-mail, ID..." oninput="renderTable()">
        <select id="statusFilter" onchange="renderTable()">
          <option value="">Todos os status</option>
          <option value="pending">Pendente</option>
          <option value="paid">Pago</option>
          <option value="processing">Processando</option>
          <option value="shipped">Enviado</option>
          <option value="delivered">Entregue</option>
          <option value="cancelled">Cancelado</option>
        </select>
        <button class="btn-refresh" onclick="loadOrders()">↻ Atualizar</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>#</th>
              <th>Cliente</th>
              <th>Endereço</th>
              <th>Itens</th>
              <th>Total</th>
              <th>Status</th>
              <th>Link Fornecedor</th>
              <th>Obs</th>
              <th>Data</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="ordersBody"></tbody>
        </table>
      </div>
    </div>

    <!-- PRODUCTS TAB -->
    <div class="tab-panel" id="tab-products">
      <div class="prod-toolbar">
        <input id="prodSearch" placeholder="Buscar produto..." oninput="renderProducts()">
        <button class="btn-refresh" onclick="loadProducts()">↻ Atualizar</button>
        <button class="btn-new" onclick="openProductModal(null)">+ Novo Produto</button>
      </div>
      <div class="prod-grid" id="prodGrid"></div>
    </div>
  </main>
</div>

<div id="toast"></div>

<!-- PRODUCT MODAL -->
<div id="productModal" class="modal-backdrop" style="display:none;" onclick="if(event.target===this)closeProductModal()">
  <div class="modal-box">
    <h3 id="modalTitle">Novo Produto</h3>
    <input type="hidden" id="modalProdId">
    <div class="form-row-2">
      <div class="form-row">
        <label>Nome *</label>
        <input id="fName" placeholder="Ex: Smart Lâmpada RGB+">
      </div>
      <div class="form-row">
        <label>Slug *</label>
        <input id="fSlug" placeholder="Ex: lampada">
      </div>
    </div>
    <div class="form-row">
      <label>Descrição curta</label>
      <input id="fDesc" placeholder="Descrição em uma linha">
    </div>
    <div class="form-row">
      <label>Descrição longa</label>
      <textarea id="fDescLong" rows="3" placeholder="Descrição detalhada do produto"></textarea>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>Preço (R$) *</label>
        <input id="fPrice" type="number" step="0.01" placeholder="0.00">
      </div>
      <div class="form-row">
        <label>Preço original (R$)</label>
        <input id="fOrigPrice" type="number" step="0.01" placeholder="0.00">
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>Categoria</label>
        <input id="fCat" placeholder="Ex: Iluminação Smart">
      </div>
      <div class="form-row">
        <label>Ícone / Emoji</label>
        <input id="fIcon" placeholder="Ex: 💡">
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>URL da Imagem</label>
        <input id="fImg" placeholder="/lampada-rgb2.png">
      </div>
      <div class="form-row">
        <label>Badge</label>
        <input id="fBadge" placeholder="Ex: 🔥 Mais vendido">
      </div>
    </div>
    <div class="form-row-2">
      <div class="form-row">
        <label>Link Amazon (fornecedor)</label>
        <input id="fAmazonUrl" placeholder="https://amazon.com.br/...">
      </div>
      <div class="form-row">
        <label>Ordem de exibição</label>
        <input id="fSortOrder" type="number" placeholder="0">
      </div>
    </div>
    <div class="form-row">
      <label style="display:flex;align-items:center;gap:10px;">
        <label class="toggle">
          <input type="checkbox" id="fActive" checked>
          <span class="slider"></span>
        </label>
        Produto ativo (visível na loja)
      </label>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeProductModal()">Cancelar</button>
      <button class="btn-submit" onclick="saveProduct()">Salvar Produto</button>
    </div>
  </div>
</div>

<script>
let TOKEN = '';
let orders = [];
let products = [];

const STATUS_LABELS = {
  pending: 'Pendente',
  paid: 'Pago',
  processing: 'Processando',
  shipped: 'Enviado',
  delivered: 'Entregue',
  cancelled: 'Cancelado',
};

function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('tab-' + name).classList.add('active');
  if (name === 'products' && products.length === 0) loadProducts();
}

function doLogin() {
  const t = document.getElementById('tokenInput').value.trim();
  if (!t) return;
  TOKEN = t;
  loadOrders();
}

function logout() {
  TOKEN = '';
  orders = [];
  products = [];
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('mainScreen').style.display = 'none';
  document.getElementById('tokenInput').value = '';
}

async function loadOrders() {
  try {
    const r = await fetch('/api/admin/orders', {
      headers: { 'x-admin-token': TOKEN }
    });
    if (r.status === 401) {
      document.getElementById('loginErr').style.display = 'block';
      return;
    }
    document.getElementById('loginErr').style.display = 'none';
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('mainScreen').style.display = 'block';
    document.getElementById('headerDate').textContent = new Date().toLocaleString('pt-BR');
    const data = await r.json();
    orders = data.orders || [];
    renderStats();
    renderTable();
  } catch (e) {
    toast('Erro ao carregar pedidos', 'err');
  }
}

function renderStats() {
  const total = orders.length;
  const paid = orders.filter(o => o.status === 'paid' || o.status === 'delivered' || o.status === 'shipped').length;
  const pending = orders.filter(o => o.status === 'pending').length;
  const revenue = orders
    .filter(o => ['paid','shipped','delivered'].includes(o.status))
    .reduce((s, o) => s + parseFloat(o.totalAmount || 0), 0);

  document.getElementById('statsRow').innerHTML = `
    <div class="stat-card"><div class="val">${total}</div><div class="lbl">Total de Pedidos</div></div>
    <div class="stat-card"><div class="val" style="color:var(--green)">${paid}</div><div class="lbl">Pagos / Enviados</div></div>
    <div class="stat-card"><div class="val" style="color:var(--gold)">${pending}</div><div class="lbl">Pendentes</div></div>
    <div class="stat-card"><div class="val" style="color:var(--accent)">R$ ${revenue.toFixed(2).replace('.',',')}</div><div class="lbl">Receita Total</div></div>
  `;
}

function renderTable() {
  const search = document.getElementById('searchInput').value.toLowerCase();
  const statusF = document.getElementById('statusFilter').value;

  const filtered = orders.filter(o => {
    const matchSearch = !search ||
      o.customerName?.toLowerCase().includes(search) ||
      o.customerEmail?.toLowerCase().includes(search) ||
      String(o.id).includes(search);
    const matchStatus = !statusF || o.status === statusF;
    return matchSearch && matchStatus;
  });

  const tbody = document.getElementById('ordersBody');
  if (!filtered.length) {
    tbody.innerHTML = `<tr><td colspan="10"><div class="empty"><div class="empty-icon">📭</div>Nenhum pedido encontrado</div></td></tr>`;
    return;
  }

  tbody.innerHTML = filtered.map(o => {
    const items = Array.isArray(o.items) ? o.items : [];
    const itemsStr = items.map(i => `${i.qty}× ${i.name}`).join('<br>');
    const date = new Date(o.createdAt).toLocaleString('pt-BR', {day:'2-digit',month:'2-digit',year:'2-digit',hour:'2-digit',minute:'2-digit'});
    return `
    <tr id="row-${o.id}">
      <td><span class="order-id">#${o.id}</span>${o.mpPaymentId ? `<div class="customer-detail">MP: ${o.mpPaymentId}</div>` : ''}</td>
      <td>
        <div class="customer-name">${esc(o.customerName)}</div>
        <div class="customer-detail">${esc(o.customerEmail)}</div>
        <div class="customer-detail">${esc(o.customerPhone)}</div>
        <div class="customer-detail">CPF: ${esc(o.customerCpf)}</div>
      </td>
      <td>
        <div class="address-block">
          ${esc(o.addressStreet)}, ${esc(o.addressNumber)}${o.addressComplement ? ' ' + esc(o.addressComplement) : ''}<br>
          ${esc(o.addressNeighborhood)}<br>
          ${esc(o.addressCity)} – ${esc(o.addressState)}<br>
          CEP: ${esc(o.addressZip)}
        </div>
      </td>
      <td><div class="items-list">${itemsStr}</div></td>
      <td><div class="amount">R$ ${parseFloat(o.totalAmount||0).toFixed(2).replace('.',',')}</div></td>
      <td><span class="badge badge-${o.status}">${STATUS_LABELS[o.status] || o.status}</span></td>
      <td>
        <textarea class="supplier-inp" id="supplier-${o.id}" placeholder="Cole aqui o link da Amazon/AliExpress para este pedido...">${esc(o.supplierLinks || '')}</textarea>
      </td>
      <td>
        <textarea class="notes-inp" id="notes-${o.id}" placeholder="Observações internas...">${esc(o.notes || '')}</textarea>
      </td>
      <td><div class="date">${date}</div></td>
      <td>
        <div class="actions">
          <select class="sel-status" id="sel-${o.id}">
            ${Object.entries(STATUS_LABELS).map(([v,l]) => `<option value="${v}"${o.status===v?' selected':''}>${l}</option>`).join('')}
          </select>
          <button class="btn-save" onclick="saveOrder(${o.id})">Salvar</button>
        </div>
      </td>
    </tr>`;
  }).join('');
}

async function saveOrder(id) {
  const status = document.getElementById(`sel-${id}`)?.value;
  const notes = document.getElementById(`notes-${id}`)?.value;
  const supplierLinks = document.getElementById(`supplier-${id}`)?.value;
  try {
    const r = await fetch(`/api/admin/orders/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify({ status, notes, supplierLinks })
    });
    if (!r.ok) throw new Error('Erro');
    const data = await r.json();
    const idx = orders.findIndex(o => o.id === id);
    if (idx !== -1) orders[idx] = data.order;
    renderStats();
    renderTable();
    toast('Pedido #' + id + ' atualizado!', 'ok');
  } catch (e) {
    toast('Erro ao salvar pedido', 'err');
  }
}

/* ── PRODUCTS ── */

async function loadProducts() {
  try {
    const r = await fetch('/api/admin/products', {
      headers: { 'x-admin-token': TOKEN }
    });
    if (!r.ok) throw new Error('Erro');
    const data = await r.json();
    products = data.products || [];
    renderProducts();
  } catch(e) {
    toast('Erro ao carregar produtos', 'err');
  }
}

function renderProducts() {
  const search = (document.getElementById('prodSearch')?.value || '').toLowerCase();
  const filtered = products.filter(p =>
    !search ||
    p.name?.toLowerCase().includes(search) ||
    p.slug?.toLowerCase().includes(search) ||
    p.category?.toLowerCase().includes(search)
  );
  const grid = document.getElementById('prodGrid');
  if (!filtered.length) {
    grid.innerHTML = `<div class="empty" style="grid-column:1/-1"><div class="empty-icon">📦</div>Nenhum produto encontrado</div>`;
    return;
  }
  grid.innerHTML = filtered.map(p => `
    <div class="prod-card ${p.active ? '' : 'inactive'}" id="pc-${p.id}">
      <div class="prod-card-head">
        <div>
          <div class="prod-card-name">${esc(p.name)}</div>
          <div class="prod-card-slug">${esc(p.slug)}</div>
          ${p.category ? `<div style="font-size:.72rem;color:var(--mist);margin-top:3px;">${esc(p.category)}</div>` : ''}
        </div>
        <div class="prod-card-price">R$ ${parseFloat(p.price||0).toFixed(2).replace('.',',')}</div>
      </div>
      ${p.description ? `<div style="font-size:.78rem;color:var(--fog);margin-bottom:10px;line-height:1.5;">${esc(p.description)}</div>` : ''}
      <div style="display:flex;align-items:center;justify-content:space-between;gap:8px;flex-wrap:wrap;">
        <div class="prod-card-actions">
          <button class="btn-edit" onclick="openProductModal(${p.id})">✏️ Editar</button>
        </div>
        <div class="toggle-wrap">
          <label class="toggle">
            <input type="checkbox" ${p.active ? 'checked' : ''} onchange="toggleProduct(${p.id},this.checked)">
            <span class="slider"></span>
          </label>
          <span>${p.active ? 'Ativo' : 'Inativo'}</span>
        </div>
      </div>
    </div>
  `).join('');
}

async function toggleProduct(id, active) {
  try {
    const r = await fetch(`/api/admin/products/${id}`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
      body: JSON.stringify({ active })
    });
    if (!r.ok) throw new Error();
    const data = await r.json();
    const idx = products.findIndex(p => p.id === id);
    if (idx !== -1) products[idx] = data.product;
    renderProducts();
    toast(`${active ? '✅ Produto ativado' : '⚠️ Produto desativado'}`, active ? 'ok' : 'err');
  } catch(e) {
    toast('Erro ao atualizar produto', 'err');
    loadProducts();
  }
}

function openProductModal(id) {
  const modal = document.getElementById('productModal');
  const p = id ? products.find(x => x.id === id) : null;
  document.getElementById('modalTitle').textContent = p ? 'Editar Produto' : 'Novo Produto';
  document.getElementById('modalProdId').value = p ? p.id : '';
  document.getElementById('fName').value = p?.name || '';
  document.getElementById('fSlug').value = p?.slug || '';
  document.getElementById('fDesc').value = p?.description || '';
  document.getElementById('fDescLong').value = p?.descriptionLong || '';
  document.getElementById('fPrice').value = p?.price || '';
  document.getElementById('fOrigPrice').value = p?.originalPrice || '';
  document.getElementById('fCat').value = p?.category || '';
  document.getElementById('fIcon').value = p?.icon || '';
  document.getElementById('fImg').value = p?.imageUrl || '';
  document.getElementById('fBadge').value = p?.badge || '';
  document.getElementById('fAmazonUrl').value = p?.amazonUrl || '';
  document.getElementById('fSortOrder').value = p?.sortOrder ?? 0;
  document.getElementById('fActive').checked = p ? !!p.active : true;
  modal.style.display = 'flex';
}

function closeProductModal() {
  document.getElementById('productModal').style.display = 'none';
}

async function saveProduct() {
  const id = document.getElementById('modalProdId').value;
  const body = {
    name: document.getElementById('fName').value.trim(),
    slug: document.getElementById('fSlug').value.trim(),
    description: document.getElementById('fDesc').value.trim(),
    descriptionLong: document.getElementById('fDescLong').value.trim(),
    price: parseFloat(document.getElementById('fPrice').value) || 0,
    originalPrice: parseFloat(document.getElementById('fOrigPrice').value) || null,
    category: document.getElementById('fCat').value.trim(),
    icon: document.getElementById('fIcon').value.trim(),
    imageUrl: document.getElementById('fImg').value.trim(),
    badge: document.getElementById('fBadge').value.trim(),
    amazonUrl: document.getElementById('fAmazonUrl').value.trim(),
    sortOrder: parseInt(document.getElementById('fSortOrder').value) || 0,
    active: document.getElementById('fActive').checked,
  };
  if (!body.name || !body.slug) { toast('Nome e slug são obrigatórios', 'err'); return; }
  try {
    let r;
    if (id) {
      r = await fetch(`/api/admin/products/${id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
        body: JSON.stringify(body)
      });
    } else {
      r = await fetch('/api/admin/products', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'x-admin-token': TOKEN },
        body: JSON.stringify(body)
      });
    }
    if (!r.ok) {
      const err = await r.json().catch(() => ({}));
      throw new Error(err.error || 'Erro');
    }
    closeProductModal();
    await loadProducts();
    toast(id ? 'Produto atualizado!' : 'Produto criado!', 'ok');
  } catch(e) {
    toast('Erro: ' + e.message, 'err');
  }
}

function esc(s) {
  return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toast(msg, type = 'ok') {
  const el = document.createElement('div');
  el.className = `t ${type}`;
  el.textContent = msg;
  document.getElementById('toast').appendChild(el);
  setTimeout(() => el.remove(), 3500);
}
</script>
</body>
</html>
